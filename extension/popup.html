<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EgoShield</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="#4CAF50" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>
        <span class="logo-text">EgoShield</span>
      </div>
      <span class="version" id="version">v2.0.0</span>
    </header>

    <!-- Status Section -->
    <section class="status-section">
      <div class="status-indicator" id="daemonStatus">
        <div class="status-dot"></div>
        <span class="status-text">Checking...</span>
      </div>
      <div class="current-domain" id="currentDomain">example.com</div>
    </section>

    <!-- Toggle Section -->
    <section class="toggle-section">
      <div class="toggle-row">
        <label for="overlayToggle">Overlay Annotations</label>
        <label class="switch">
          <input type="checkbox" id="overlayToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <label for="trustToggle">Trust this domain</label>
        <label class="switch">
          <input type="checkbox" id="trustToggle">
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <!-- Quick Stats -->
    <section class="stats-section" id="statsSection" style="display: none;">
      <h3>Last Analysis</h3>
      <div class="stat-row">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="lastScore">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Severity</span>
        <span class="stat-value severity-badge" id="lastSeverity">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Patterns</span>
        <span class="stat-value" id="lastPatterns">--</span>
      </div>
    </section>

    <!-- Actions -->
    <section class="actions-section">
      <button class="action-btn primary" id="analyzeBtn">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        Re-analyze Page
      </button>
      <button class="action-btn" id="dashboardBtn">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
        Open Dashboard
      </button>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <a href="#" id="settingsLink">Settings</a>
      <span class="separator">•</span>
      <a href="#" id="helpLink">Help</a>
    </footer>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
